<!DOCTYPE html>
<html lang="uk">
<head>

    <title>Шлях Героя - Калькулятор Архетипів</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #2c1810, #4a2818, #2c1810);

            padding: 15px;
            display: flex;
            justify-content: center;
            align-items: flex-start;
        }

        .container {
            background: linear-gradient(145deg, #f5ede4, #e8dccc);
            max-width: 480px;
            width: 100%;
            padding: 25px 20px 30px;
            border-radius: 24px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.6), 0 0 0 2px #b8956a inset;
            margin-top: 10px;
        }

        /* ===== НОВА НАЗВА ===== */
        .main-title {
            text-align: center;
            font-size: 28px;
            font-weight: 800;
            color: #3d2113;
            letter-spacing: 3px;
            text-shadow: 1px 1px 0 rgba(184, 149, 106, 0.3);
            line-height: 1.2;
        }

        .main-title span {
            color: #8b6b3c;
        }

        .sub-title {
            text-align: center;
            font-size: 14px;
            color: #6b4c33;
            font-weight: 600;
            letter-spacing: 4px;
            text-transform: uppercase;
            margin-top: 2px;
            margin-bottom: 16px;
            border-bottom: 2px solid #b8956a;
            padding-bottom: 12px;
        }

        .sub-title span {
            color: #8b6b3c;
        }

        .input-group {
            margin-bottom: 16px;
        }

        label {
            display: block;
            font-weight: 700;
            color: #3d2113;
            margin-bottom: 6px;
            font-size: 14px;
            letter-spacing: 0.5px;
        }

        /* ===== РУЧНЕ ВВЕДЕННЯ ДАТИ ===== */
        .date-input-wrapper {
            display: flex;
            gap: 8px;
            align-items: center;
        }

        .date-input-wrapper input {
            flex: 1;
            padding: 16px 12px;
            border: 2px solid #b8956a;
            border-radius: 14px;
            font-size: 18px;
            background: #fcf8f2;
            transition: border-color 0.3s, box-shadow 0.3s;
            color: #2c1810;
            font-weight: 600;
            height: 60px;
            text-align: center;
            min-width: 0;
        }

        .date-input-wrapper input:focus {
            outline: none;
            border-color: #8b6b3c;
            box-shadow: 0 0 0 4px rgba(184, 149, 106, 0.25);
        }

        .date-input-wrapper input::placeholder {
            color: #b8956a;
            font-weight: 400;
            font-size: 14px;
        }

        .date-input-wrapper .separator {
            font-size: 24px;
            font-weight: 700;
            color: #8b6b3c;
            padding: 0 2px;
        }

        /* ===== КНОПКИ ===== */
        button {
            width: 100%;
            padding: 18px;
            background: linear-gradient(135deg, #5c3a20, #3d2113);
            color: #f5ede4;
            border: 2px solid #b8956a;
            border-radius: 14px;
            font-size: 20px;
            font-weight: 700;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s, background 0.3s;
            letter-spacing: 1.5px;
            height: 60px;
            text-shadow: 0 1px 2px rgba(0, 0, 0, 0.3);
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(92, 58, 32, 0.4);
            background: linear-gradient(135deg, #6b4628, #4a2818);
        }

        button:active {
            transform: translateY(0);
            box-shadow: 0 5px 15px rgba(92, 58, 32, 0.3);
        }

        #result {
            margin-top: 25px;
            display: none;
        }

        /* ===== КАРТКИ РЕЗУЛЬТАТІВ ===== */
        .result-card {
            background: linear-gradient(145deg, #f5ede4, #ece0d2);
            border-radius: 16px;
            padding: 18px 16px;
            margin-bottom: 12px;
            border-left: 5px solid #b8956a;
            animation: slideIn 0.4s ease;
            transition: transform 0.2s;
            box-shadow: 0 2px 8px rgba(44, 24, 16, 0.08);
        }

        .result-card:active {
            transform: scale(0.98);
        }

        .result-card .position {
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            color: #8b6b3c;
            font-weight: 700;
        }

        .result-card .number {
            font-size: 30px;
            font-weight: 800;
            color: #3d2113;
            display: inline-block;
            margin-right: 10px;
        }

        .result-card .title {
            font-size: 17px;
            font-weight: 600;
            color: #3d2113;
            display: inline-block;
        }

        .result-card .meaning {
            margin-top: 8px;
            color: #4a3224;
            line-height: 1.6;
            font-size: 14px;
        }

        .result-card .tarot {
            margin-top: 10px;
            padding: 10px 14px;
            background: rgba(184, 149, 106, 0.15);
            border-radius: 10px;
            font-size: 14px;
            color: #3d2113;
            border-left: 3px solid #b8956a;
            font-weight: 500;
        }

        .result-card .tarot span {
            font-weight: 700;
            color: #5c3a20;
        }

            border-left-color: #d4a854;

        }

        .result-card.highlight .tarot span {
            color: #d4a854;
        }

        .result-card.highlight .position {
            color: #d4a854;
        }

            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .reset-btn {
            margin-top: 15px;
            background: #e8dccc;
            color: #3d2113;
            font-size: 15px;
            padding: 14px;

        }

            text-decoration: none;
            font-size: 18px;
            font-weight: 700;
            letter-spacing: 1px;

            align-items: center;
            justify-content: center;

        }

            font-size: 28px;
        }

        .telegram-link .telegram-text {
            font-size: 14px;
            font-weight: 400;
            color: #b8956a;
            display: block;
            margin-top: 4px;

            }

                font-size: 16px;
            }

            }

                padding: 12px 10px 20px;

                font-size: 15px;
                padding: 12px 6px;

            }

            }

            }

                font-size: 14px;
            }

        @media (min-width: 768px) {
            .container {

            }

                font-size: 34px;
            }

            .date-input-wrapper input {
                height: 64px;
                font-size: 22px;
            }

            button {
                height: 64px;
                font-size: 22px;
            }
        }

        input:-webkit-autofill {
            -webkit-box-shadow: 0 0 0 1000px #fcf8f2 inset !important;
            -webkit-text-fill-color: #2c1810 !important;
        }
    </style>
</head>
<body>

        // ============================================================
        // 2. ЛОГІКА РОЗРАХУНКІВ
        // ============================================================
        function reduceTo22(number) {
            while (number > 22) {
                number -= 22;
            }
            return number;
        }

        function calculate() {
            const dayInput = document.getElementById('day');
            const monthInput = document.getElementById('month');
            const yearInput = document.getElementById('year');
            const resultDiv = document.getElementById('result');

            const day = parseInt(dayInput.value);
            const month = parseInt(monthInput.value);
            const year = parseInt(yearInput.value);

            // Валідація
            if (!day || !month || !year) {
                alert('Будь ласка, заповніть всі поля: день, місяць та рік');
                return;
            }

            if (day < 1 || day > 31) {
                alert('День має бути від 1 до 31');
                return;
            }

            if (month < 1 || month > 12) {
                alert('Місяць має бути від 1 до 12');
                return;
            }

            if (year < 1900 || year > 2100) {
                alert('Рік має бути від 1900 до 2100');
                return;
            }

            // Позиція 1: День народження
            const pos1 = reduceTo22(day);

            // Позиція 2: Місяць народження
            const pos2 = reduceTo22(month);

            // Позиція 3: Рік народження (сума цифр)
            let yearSum = 0;
            const yearStr = year.toString();
            for (const char of yearStr) {
                yearSum += parseInt(char);
            }
            const pos3 = reduceTo22(yearSum);

            // Позиція 4: Страхи блоки = 1 + 2
            const pos4 = reduceTo22(pos1 + pos2);

            // Позиція 5: Талант = 2 + 3
            const pos5 = reduceTo22(pos2 + pos3);

            // Позиція 6: Дар = 4 + 5
            const pos6 = reduceTo22(pos4 + pos5);

            // Позиція 7: Місія = 3 + 4
            const pos7 = reduceTo22(pos3 + pos4);

            // Позиція 8: Зверхдар = 2 + 6
            const pos8 = reduceTo22(pos2 + pos6);

            const positions = [
                { num: pos1, title: "Дитинство та юність", desc: "Ранні роки, формування особистості" },
                { num: pos2, title: "Зрілість (уроки дорослішання)", desc: "Основні життєві уроки" },
                { num: pos3, title: "Поважний вік, підсумок", desc: "Мудрість років, головний підсумок життя" },
                { num: pos4, title: "Страхи та блоки", desc: "Внутрішні обмеження, що стримують" },
                { num: pos5, title: "Талант", desc: "Головна здібність, яку варто реалізувати" },
                { num: pos6, title: "Дар", desc: "Унікальний дар від народження" },
                { num: pos7, title: "Місія", desc: "Головне призначення у житті" },
                { num: pos8, title: "Зверхдар", desc: "Надможливість, найвищий прояв сутності" }
            ];

            let html = '';
            positions.forEach((pos, index) => {
                const isMain = (index === 7);
                const data = meanings[pos.num] || {
                    text: `Тлумачення для числа ${pos.num} ще не додано`,
                    tarot: `🃏 Аркан ${pos.num} — додайте опис`
                };

                html += `
                    <div class="result-card ${isMain ? 'highlight' : ''}">
                        <div class="position">Позиція ${index + 1}</div>
                        <div>
                            <span class="number">${pos.num}</span>
                            <span class="title">${pos.title}</span>
                        </div>
                        <div class="meaning">
                            <strong>${pos.desc}</strong><br>
                            ${data.text}
                        </div>
                        <div class="tarot">
                            <span>Таро-архетип:</span> ${data.tarot}
                        </div>
                    </div>
                `;
            });

            html += `
                <button class="reset-btn" onclick="resetResults()">🔄 Очистити результати</button>
            `;

            resultDiv.innerHTML = html;
            resultDiv.style.display = 'block';
            resultDiv.scrollIntoView({ behavior: 'smooth', block: 'start' });
        }

        function resetResults() {
            document.getElementById('result').style.display = 'none';
            document.getElementById('result').innerHTML = '';
            document.getElementById('day').value = '';
            document.getElementById('month').value = '';
            document.getElementById('year').value = '';
            document.getElementById('day').focus();
        }

        // ============================================================
        // 3. АВТОМАТИЧНЕ ПЕРЕХОДЖЕННЯ МІЖ ПОЛЯМИ
        // ============================================================
        document.addEventListener('DOMContentLoaded', function() {
            const dayInput = document.getElementById('day');
            const monthInput = document.getElementById('month');
            const yearInput = document.getElementById('year');

            dayInput.addEventListener('input', function() {
                this.value = this.value.replace(/\D/g, '').slice(0, 2);
                if (this.value.length === 2) {
                    monthInput.focus();
                }
            });

            monthInput.addEventListener('input', function() {
                this.value = this.value.replace(/\D/g, '').slice(0, 2);
                if (this.value.length === 2) {
                    yearInput.focus();
                }
            });

            yearInput.addEventListener('input', function() {
                this.value = this.value.replace(/\D/g, '').slice(0, 4);
            });

            dayInput.addEventListener('keydown', function(e) {
                if (e.key === 'Enter') {
                    if (this.value.length === 2) {
                        monthInput.focus();
                    } else {
                        monthInput.focus();
                    }
                }
            });

            monthInput.addEventListener('keydown', function(e) {
                if (e.key === 'Enter') {
                    if (this.value.length === 2) {
                        yearInput.focus();
                    } else {
                        yearInput.focus();
                    }
                }
            });

            yearInput.addEventListener('keydown', function(e) {
                if (e.key === 'Enter') {
                    calculate();
                }
            });

            dayInput.focus();
        });
    </script>
</body>
</html>
